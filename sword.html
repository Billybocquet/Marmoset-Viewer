<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sword Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #viewer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>

  <script src="./marmoset.js"></script>
  <script>
    marmoset.embed("./Sword.mview", {
      autoStart: true,
      fullFrame: true,
      width: window.innerWidth,
      height: window.innerHeight
    });
  </script>
</body>
</html>
