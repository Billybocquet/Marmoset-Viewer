<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marmoset Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #fallback {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="fallback">
    Impossible de charger le viewer.<br>
    Vérifie que <strong>marmoset.js</strong> et <strong>Sword.mview</strong> sont bien à la racine du dépôt.
  </div>

  <script src="./marmoset.js"></script>
  <script>
    try {
      if (typeof marmoset === "undefined") {
        document.getElementById("fallback").style.display = "flex";
      } else {
        marmoset.embed("./Sword.mview", {
          autoStart: true,
          fullFrame: true
        });
      }
    } catch (error) {
      console.error(error);
      document.getElementById("fallback").style.display = "flex";
    }
  </script>
</body>
</html>
