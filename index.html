<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marmoset Viewer Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 40px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    a.card {
      display: block;
      padding: 20px;
      border-radius: 12px;
      background: #1b1b1b;
      color: white;
      text-decoration: none;
      border: 1px solid #2d2d2d;
      transition: 0.2s ease;
    }

    a.card:hover {
      background: #252525;
      border-color: #444;
    }

    p {
      color: #aaa;
      margin-top: 0;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <h1>Marmoset Viewer Gallery</h1>
  <p>Choisis une scène à ouvrir.</p>

  <div class="grid">
    <a class="card" href="sword.html">Sword</a>
    <a class="card" href="lamp.html">Lamp</a>
    <a class="card" href="desk.html">Desk</a>
    <a class="card" href="crate.html">Crate</a>
    <a class="card" href="container.html">Container</a>
    <a class="card" href="scifi-cube.html">SciFi Cube</a>
    <a class="card" href="radio.html">Radio</a>
  </div>
</body>
</html>
